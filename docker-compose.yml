services:
  api:
    build: ./api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - photo_storage:/app/photos
    networks:
      - app_network
  db:
    image: "postgres:16-alpine"
    ports: 
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_network
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  nginx:
    build: ./docker/nginx
    ports: 
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - photo_storage:/app/photos
    networks:
      - app_network
volumes:
    pg_data:
    photo_storage:
networks:
  app_network:
    driver: bridge