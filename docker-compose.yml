services:
  api:
    build: ./api
    ports:
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - photo_storage:/app/photos
    networks:
      - app_network
  db:
    image: "postgres:16-alpine"
    ports: 
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_network
  nginx:
    build: ./docker/nginx
    ports: 
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - photo_storage:/app/photos
    networks:
      - app_network
volumes:
    pg_data:
    photo_storage:
networks:
  app_network:
    driver: bridge