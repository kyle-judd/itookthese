<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl animate-fade-in"
  (click)="closed.emit()"
>
  <div
    class="relative w-full max-w-lg animate-modal-in"
    (click)="$event.stopPropagation()"
  >
    <!-- Close button -->
    <button
      (click)="closed.emit()"
      class="absolute -top-4 -right-4 glass-button p-3 rounded-full transition-transform hover:scale-110 active:scale-90 z-10"
      aria-label="Close"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>

    <div class="glass-card p-8 rounded-3xl">

      @if (submitted()) {
        <!-- Success state -->
        <div class="text-center py-8">
          <div class="inline-block glass-card p-4 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-green-500" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
          </div>
          <h2 class="text-2xl font-medium mb-2">Message sent!</h2>
          <p class="opacity-60">Thanks for reaching out. I'll get back to you soon.</p>
          <button
            (click)="closed.emit()"
            class="glass-button mt-6 px-6 py-2.5 rounded-full text-sm transition-transform hover:scale-105"
          >
            Close
          </button>
        </div>
      } @else {
        <!-- Form -->
        <div class="mb-6">
          <h2 class="text-2xl font-medium mb-1">Get in touch</h2>
          <p class="opacity-60 text-sm">Fill out the form and I'll get back to you.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">

          <!-- Honeypot — hidden from real users -->
          <input formControlName="honeypot" type="text" class="hidden" autocomplete="off" tabindex="-1" />

          <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-1.5">
              <label class="text-sm opacity-70">Name</label>
              <input
                formControlName="name"
                type="text"
                autocomplete="name"
                class="glass-card px-4 py-3 rounded-xl outline-none bg-transparent placeholder:opacity-30"
                placeholder="Jane Smith"
              />
            </div>
            <div class="flex flex-col gap-1.5">
              <label class="text-sm opacity-70">Email</label>
              <input
                formControlName="email"
                type="email"
                autocomplete="email"
                class="glass-card px-4 py-3 rounded-xl outline-none bg-transparent placeholder:opacity-30"
                placeholder="jane@example.com"
              />
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-sm opacity-70">Subject</label>
            <input
              formControlName="subject"
              type="text"
              class="glass-card px-4 py-3 rounded-xl outline-none bg-transparent placeholder:opacity-30"
              placeholder="Photography inquiry"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-sm opacity-70">Message</label>
            <textarea
              formControlName="message"
              rows="5"
              class="glass-card px-4 py-3 rounded-xl outline-none bg-transparent resize-none placeholder:opacity-30"
              placeholder="Your message..."
            ></textarea>
          </div>

          @if (error()) {
            <p class="text-sm text-red-500">{{ error() }}</p>
          }

          <button
            type="submit"
            [disabled]="form.invalid || loading()"
            class="glass-button w-full py-3 rounded-xl font-medium mt-1 transition-transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
          >
            @if (loading()) {
              <span class="inline-flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                </svg>
                Sending...
              </span>
            } @else {
              Send message
            }
          </button>

        </form>
      }

    </div>
  </div>
</div>
