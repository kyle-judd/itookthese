<div class="min-h-screen bg-background text-foreground">
  <app-header />
  <main>
    <app-hero />
    <div id="gallery">
      @defer (on viewport; on timer(500ms)) {
        <app-gallery />
      } @placeholder {
        <div class="py-24"></div>
      }
    </div>
    <div id="about">
      @defer (on viewport; on timer(1s)) {
        <app-about />
      } @placeholder {
        <div class="py-24"></div>
      }
    </div>
  </main>
  <app-footer (openContact)="showContact.set(true)" />
</div>

@if (showContact()) {
  <app-contact (closed)="showContact.set(false)" />
}
