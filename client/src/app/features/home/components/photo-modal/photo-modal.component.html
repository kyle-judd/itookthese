<div
  class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-xl animate-fade-in"
  (click)="closed.emit()"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  <!-- Close button -->
  <button
    (click)="closed.emit()"
    class="absolute top-4 right-4 md:top-6 md:right-6 glass-button p-2.5 md:p-3 rounded-full transition-transform hover:scale-110 active:scale-90 z-10"
    aria-label="Close"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 6 6 18M6 6l12 12"/>
    </svg>
  </button>

  <!-- Previous arrow -->
  @if (hasPrev()) {
    <button
      (click)="$event.stopPropagation(); prev()"
      class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 glass-button p-2.5 md:p-3 rounded-full transition-transform hover:scale-110 active:scale-90 z-10"
      aria-label="Previous photo"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
  }

  <!-- Next arrow -->
  @if (hasNext()) {
    <button
      (click)="$event.stopPropagation(); next()"
      class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 glass-button p-2.5 md:p-3 rounded-full transition-transform hover:scale-110 active:scale-90 z-10"
      aria-label="Next photo"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  }

  <!-- Content -->
  <div
    class="relative flex flex-col max-h-[100dvh] w-full max-w-7xl px-2 py-2 md:px-12 md:py-6 animate-modal-in"
    (click)="$event.stopPropagation()"
  >
    <!-- Image container — takes remaining space -->
    <div class="flex-1 min-h-0 flex items-center justify-center">
      <img
        [src]="photo().fullUrl"
        [alt]="photo().title"
        class="max-w-full max-h-[calc(100dvh-8rem)] md:max-h-[calc(100dvh-10rem)] object-contain rounded-2xl md:rounded-3xl"
      />
    </div>

    <!-- Info bar -->
    <div class="glass-card mt-2 md:mt-4 px-4 py-3 md:px-6 md:py-4 rounded-2xl md:rounded-3xl flex items-center justify-between gap-3 shrink-0">
      <div class="min-w-0">
        <h3 class="text-lg md:text-2xl font-medium truncate">{{ photo().title }}</h3>
        @if (photo().category) {
          <p class="text-sm md:text-base opacity-70 truncate">{{ photo().category }}</p>
        }
      </div>
      <a
        [routerLink]="['/photo', photo().id]"
        (click)="saveSelection()"
        class="glass-button shrink-0 inline-flex items-center gap-2 px-3 py-1.5 md:px-4 md:py-2 rounded-full text-xs md:text-sm transition-transform hover:scale-105 active:scale-95"
      >
        View details
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 md:w-4 md:h-4" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </a>
    </div>
  </div>
</div>
