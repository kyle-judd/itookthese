<div
  class="group cursor-pointer transition-transform duration-500 hover:-translate-y-2"
  (click)="photoSelected.emit(photo())"
>
  <div class="relative overflow-hidden rounded-3xl aspect-[4/5]">
    @if (photo().placeholderBase64 && !imageLoaded()) {
      <img
        [src]="photo().placeholderBase64!"
        [alt]="photo().title"
        class="absolute inset-0 w-full h-full object-cover blur-lg scale-110"
        aria-hidden="true"
      />
    }
    <img
      [src]="photo().mediumUrl"
      [alt]="photo().title"
      class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110"
      [class.opacity-0]="!imageLoaded() && photo().placeholderBase64"
      [class.opacity-100]="imageLoaded() || !photo().placeholderBase64"
      loading="lazy"
      (load)="onImageLoad()"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
    <div class="absolute bottom-0 left-0 right-0 p-6 translate-y-full group-hover:translate-y-0 transition-transform duration-500">
      <h3 class="text-white font-medium mb-1">{{ photo().title }}</h3>
      <p class="text-white/70 text-sm">{{ photo().category }}</p>
    </div>
  </div>
</div>
