<div class="min-h-screen bg-background text-foreground flex items-center justify-center px-6">

  <div class="w-full max-w-sm animate-fade-up">
    <div class="glass-card p-10 rounded-3xl">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-block glass-card p-3 rounded-full mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="text-2xl font-medium">Admin Login</h1>
        <p class="text-sm opacity-50 mt-1">iTookThese dashboard</p>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">

        <div class="flex flex-col gap-1.5">
          <label for="username" class="text-sm opacity-70">Username</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            autocomplete="username"
            class="glass-card px-4 py-3 rounded-xl outline-none w-full bg-transparent placeholder:opacity-30"
            placeholder="admin"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="password" class="text-sm opacity-70">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            class="glass-card px-4 py-3 rounded-xl outline-none w-full bg-transparent placeholder:opacity-30"
            placeholder="••••••••"
          />
        </div>

        @if (error()) {
          <p class="text-sm text-red-500 text-center">{{ error() }}</p>
        }

        <button
          type="submit"
          [disabled]="form.invalid || loading()"
          class="glass-button w-full py-3 rounded-xl font-medium mt-2 transition-transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
        >
          @if (loading()) {
            <span class="inline-flex items-center justify-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
              </svg>
              Signing in...
            </span>
          } @else {
            Sign in
          }
        </button>

      </form>
    </div>
  </div>

</div>
