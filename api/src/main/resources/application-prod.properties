logging.level.io.itookthese=WARN
logging.level.org.springframework.web=WARN

spring.jpa.show-sql=false

# Mail - Resend API
mail.notification.enabled=${MAIL_ENABLED:false}
mail.notification.to=${MAIL_NOTIFICATION_TO:}
mail.notification.from=${MAIL_FROM:noreply@itookthese.app}
resend.api.key=${RESEND_API_KEY:}

# Actuator - only health and info in prod
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
