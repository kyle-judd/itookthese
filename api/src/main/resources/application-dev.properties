logging.level.io.itookthese=DEBUG
logging.level.org.springframework.web=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mail disabled by default in dev
mail.notification.enabled=false
mail.notification.to=

# Relaxed CORS for local development
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:80

# Actuator - expose all endpoints in dev
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
